<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found &mdash; Vera5</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0E11">
<meta name="color-scheme" content="dark">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">

<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">

<link rel="stylesheet" href="styles.css">

<style>
  .error-page {
    min-height: 100vh;
    min-height: 100svh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: var(--s-2xl) var(--s-lg);
    position: relative;
    overflow: hidden;
  }
  .error-page::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(50% 50% at 50% 30%, var(--accent-glow), transparent 70%);
  }
  .error-inner {
    position: relative;
    z-index: 1;
    max-width: 560px;
  }
  .error-logo {
    width: 44px;
    height: 44px;
    margin-bottom: var(--s-lg);
  }
  .error-code {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(96px, 20vw, 200px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: transparent;
    -webkit-text-stroke: 1.5px var(--border-hard);
    margin: 0;
  }
  .error-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: clamp(24px, 3.4vw, 34px);
    letter-spacing: -0.02em;
    margin: var(--s-md) 0 var(--s-sm);
  }
  .error-text {
    color: var(--text-secondary);
    font-size: 16.5px;
    line-height: 1.6;
    margin: 0 auto var(--s-xl);
    max-width: 44ch;
  }
  .error-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--s-md);
    flex-wrap: wrap;
  }
</style>
</head>
<body>
<main class="error-page">
  <div class="error-inner">
    <img class="error-logo" src="assets/logo-mark.svg" alt="Vera5" width="44" height="44">
    <p class="hero-eyebrow"><span class="hero-eyebrow-tick" aria-hidden="true"></span>Error &middot; 404</p>
    <h1 class="error-code">404</h1>
    <p class="error-title">This page left no indicators.</p>
    <p class="error-text">The page you were looking for isn&rsquo;t here. Check the address, or head back to the start.</p>
    <div class="error-actions">
      <a class="btn btn-primary" href="/">
        Back to home
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a class="btn btn-secondary" href="https://github.com/0xCBradford/Vera5" rel="noopener">View on GitHub</a>
    </div>
  </div>
</main>
</body>
</html>
